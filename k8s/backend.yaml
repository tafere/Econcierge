apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend
  namespace: econcierge
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::027653365943:role/econcierge-backend-role
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: econcierge
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: econcierge
  labels:
    app: backend
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend
      containers:
      - name: backend
        # deploy.yml will update this SHA automatically
        image: 027653365943.dkr.ecr.us-east-2.amazonaws.com/econcierge-backend:98ed67008961fc4e3d49241ef37964e08ca1dc8f
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres.econcierge.svc.cluster.local:5432/econcierge"
        - name: SPRING_DATASOURCE_USERNAME
          value: "postgres"
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: econcierge-secrets
              key: POSTGRES_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: econcierge-secrets
              key: JWT_SECRET
        envFrom:
        - configMapRef:
            name: backend-config
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 45
          periodSeconds: 10
          failureThreshold: 5
