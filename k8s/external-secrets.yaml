apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: econcierge-secrets
  namespace: econcierge
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: econcierge-secrets
    creationPolicy: Owner
  data:
  - secretKey: POSTGRES_PASSWORD
    remoteRef:
      key: econcierge/backend
      property: POSTGRES_PASSWORD
  - secretKey: JWT_SECRET
    remoteRef:
      key: econcierge/backend
      property: JWT_SECRET
