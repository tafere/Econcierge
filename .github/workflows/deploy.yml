name: Build and Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-2.amazonaws.com
  BACKEND_REPO: econcierge-backend
  FRONTEND_REPO: econcierge-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build backend
        working-directory: backend
        run: ./gradlew clean bootJar

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build frontend
        run: npm ci && npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$BACKEND_REPO:$TAG backend/
          docker push $REGISTRY/$BACKEND_REPO:$TAG

      - name: Build and push frontend image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$FRONTEND_REPO:$TAG -f docker/Dockerfile.frontend .
          docker push $REGISTRY/$FRONTEND_REPO:$TAG

      - name: Update image tags in k8s manifests
        env:
          TAG: ${{ github.sha }}
        run: |
          sed -i "s|econcierge-backend:.*|econcierge-backend:$TAG|g" k8s/backend.yaml
          sed -i "s|econcierge-frontend:.*|econcierge-frontend:$TAG|g" k8s/frontend.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/backend.yaml k8s/frontend.yaml
          git diff --cached --quiet || git commit -m "chore: update image tags to ${{ github.sha }}"
          git push
